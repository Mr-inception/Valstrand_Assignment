services:
  # Backend Web Service
  - type: web
    name: job-queue-backend
    runtime: node
    buildCommand: npm install
    startCommand: node index.js
    env: node
    rootDir: backend
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false # User will need to add this manually in the dashboard

  # Frontend Static Site
  - type: web
    name: job-queue-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    plan: free
    envVars:
      - key: VITE_API_BASE
        fromService:
          type: web
          name: job-queue-backend
          property: host
        suffix: /api
